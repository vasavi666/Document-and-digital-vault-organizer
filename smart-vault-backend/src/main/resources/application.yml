server:
  port: 8080

spring:
  application:
    name: smart-vault
  datasource:
    url: jdbc:mysql://localhost:3307/smart_vault?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:noreply@smartvault.com}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:myVeryLongAndSecureSecretKeyForJWTTokenGeneration2024SmartVaultApplicationKey}
    access-token-expiration: 900000       # 15 minutes
    refresh-token-expiration: 604800000   # 7 days
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:demo}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}
  ocr:
    tessdata-path: ${TESSDATA_PATH:/usr/share/tesseract-ocr/5/tessdata}
    enabled: ${OCR_ENABLED:true}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.smartvault: DEBUG
    org.springframework.security: WARN
